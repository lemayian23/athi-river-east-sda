<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Events</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* (same styles as sermons.html) – copy from above */
    * { font-family: 'Inter', sans-serif; }
    .bg-gradient-sda { background: linear-gradient(135deg, #1a2a4f 0%, #2c3e6d 100%); }
    .sidebar-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem; color: #94a3b8; transition: all 0.2s; border-radius: 0.5rem; margin: 0.25rem 0.75rem; text-decoration: none; }
    .sidebar-link:hover { background: rgba(255,255,255,0.1); color: white; }
    .sidebar-link.active { background: rgba(255,255,255,0.15); color: #c9a03d; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; }
    .modal.open { display: flex; }
    .modal-content { background: white; padding: 2rem; border-radius: 1rem; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .btn-primary { background: linear-gradient(135deg, #1a2a4f, #2c3e6d); color: white; padding: 0.5rem 1.5rem; border-radius: 0.5rem; border: none; cursor: pointer; }
    .btn-primary:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(26,42,79,0.3); }
    .btn-danger { background: #ef4444; color: white; padding: 0.25rem 1rem; border-radius: 0.5rem; border: none; cursor: pointer; }
    .btn-danger:hover { background: #dc2626; }
    .btn-edit { background: #3b82f6; color: white; padding: 0.25rem 1rem; border-radius: 0.5rem; border: none; cursor: pointer; }
    .btn-edit:hover { background: #2563eb; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">
  <!-- Sidebar (same as above) -->
  <aside class="w-64 bg-gradient-sda text-white flex flex-col flex-shrink-0 min-h-screen">
    <div class="p-6 text-xl font-bold border-b border-white/10">⛪ Athi River SDA</div>
    <nav class="flex-1 mt-4">
      <a href="/admin/dashboard.html" class="sidebar-link">📊 Dashboard</a>
      <a href="/admin/sermons.html" class="sidebar-link">📖 Sermons</a>
      <a href="/admin/events.html" class="sidebar-link active">📅 Events</a>
      <a href="/admin/ministries.html" class="sidebar-link">👥 Ministries</a>
      <a href="/admin/prayers.html" class="sidebar-link">🙏 Prayers</a>
      <a href="/admin/settings.html" class="sidebar-link">⚙️ Settings</a>
    </nav>
    <div class="p-6 border-t border-white/10">
      <button onclick="logout()" class="sidebar-link text-red-300 hover:text-red-200 w-full text-left">🚪 Logout</button>
    </div>
  </aside>

  <main class="flex-1 p-8 overflow-y-auto">
    <div class="flex justify-between items-center mb-6">
      <div><h1 class="text-3xl font-bold text-gray-800">📅 Events</h1><p class="text-gray-500">Manage church events</p></div>
      <button onclick="openAddModal()" class="btn-primary">+ Add Event</button>
    </div>

    <input type="text" id="searchInput" placeholder="Search events..." class="w-full p-3 border rounded-lg mb-4 focus:ring-2 focus:ring-yellow-500">

    <div class="bg-white rounded-xl shadow overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-50"><tr><th class="p-4 text-left">Title</th><th class="p-4 text-left">Date</th><th class="p-4 text-left">Location</th><th class="p-4 text-left">Actions</th></tr></thead>
        <tbody id="eventsTableBody"><tr><td colspan="4" class="p-4 text-center text-gray-500">Loading...</td></tr></tbody>
      </table>
    </div>

    <!-- Modal -->
    <div id="eventModal" class="modal">
      <div class="modal-content">
        <h2 id="modalTitle" class="text-2xl font-bold text-gray-800 mb-4">Add Event</h2>
        <form id="eventForm">
          <input type="hidden" id="eventId">
          <div class="mb-3"><label class="block text-sm font-medium text-gray-700">Title *</label><input type="text" id="title" required class="w-full p-2 border rounded-lg"></div>
          <div class="mb-3"><label class="block text-sm font-medium text-gray-700">Description</label><textarea id="description" rows="2" class="w-full p-2 border rounded-lg"></textarea></div>
          <div class="mb-3"><label class="block text-sm font-medium text-gray-700">Event Date *</label><input type="datetime-local" id="eventDate" required class="w-full p-2 border rounded-lg"></div>
          <div class="mb-3"><label class="block text-sm font-medium text-gray-700">End Date (optional)</label><input type="datetime-local" id="endDate" class="w-full p-2 border rounded-lg"></div>
          <div class="mb-3"><label class="block text-sm font-medium text-gray-700">Location</label><input type="text" id="location" class="w-full p-2 border rounded-lg"></div>
          <div class="mb-4"><label class="block text-sm font-medium text-gray-700">Image URL</label><input type="url" id="imageUrl" class="w-full p-2 border rounded-lg"></div>
          <div class="flex justify-end gap-2">
            <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-lg hover:bg-gray-50">Cancel</button>
            <button type="submit" class="btn-primary">Save Event</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="/admin/admin.js"></script>
  <script>
    if (!getToken()) window.location.href = '/admin/login.html';

    window.openAddModal = function() {
      document.getElementById('modalTitle').textContent = 'Add Event';
      document.getElementById('eventForm').reset();
      document.getElementById('eventId').value = '';
      document.getElementById('eventModal').classList.add('open');
    };
    window.closeModal = function() {
      document.getElementById('eventModal').classList.remove('open');
    };
    document.getElementById('eventModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    let allEvents = [];
    async function loadEvents() {
      try {
        allEvents = await apiRequest('/events');
        renderTable(allEvents);
      } catch (err) {
        document.getElementById('eventsTableBody').innerHTML = '<tr><td colspan="4" class="p-4 text-center text-red-500">Error loading</td></tr>';
      }
    }
    function renderTable(data) {
      const tbody = document.getElementById('eventsTableBody');
      if (!data.length) return tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-gray-500">No events</td></tr>';
      tbody.innerHTML = data.map(e => `
        <tr class="border-t hover:bg-gray-50">
          <td class="p-4 font-medium">${e.title}</td>
          <td class="p-4">${new Date(e.event_date).toLocaleString()}</td>
          <td class="p-4">${e.location || '-'}</td>
          <td class="p-4 space-x-1">
            <button onclick="editEvent(${e.id})" class="btn-edit">Edit</button>
            <button onclick="deleteEvent(${e.id})" class="btn-danger">Delete</button>
          </td>
        </tr>
      `).join('');
    }
    document.getElementById('searchInput').addEventListener('input', function() {
      const q = this.value.toLowerCase();
      renderTable(allEvents.filter(e => e.title.toLowerCase().includes(q)));
    });
    window.editEvent = async function(id) {
      try {
        const e = await apiRequest(`/events/${id}`);
        document.getElementById('modalTitle').textContent = 'Edit Event';
        document.getElementById('eventId').value = e.id;
        document.getElementById('title').value = e.title;
        document.getElementById('description').value = e.description || '';
        document.getElementById('eventDate').value = e.event_date.slice(0,16);
        document.getElementById('endDate').value = e.end_date ? e.end_date.slice(0,16) : '';
        document.getElementById('location').value = e.location || '';
        document.getElementById('imageUrl').value = e.image_url || '';
        document.getElementById('eventModal').classList.add('open');
      } catch (err) { alert('Error loading event'); }
    };
    window.deleteEvent = async function(id) {
      if (!confirm('Delete this event?')) return;
      try {
        await apiRequest(`/events/${id}`, { method: 'DELETE' });
        showNotification('Event deleted', 'success');
        loadEvents();
      } catch (err) { alert('Failed to delete'); }
    };
    document.getElementById('eventForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const id = document.getElementById('eventId').value;
      const data = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        event_date: document.getElementById('eventDate').value,
        end_date: document.getElementById('endDate').value || null,
        location: document.getElementById('location').value,
        image_url: document.getElementById('imageUrl').value
      };
      try {
        if (id) {
          await apiRequest(`/events/${id}`, { method: 'PUT', body: JSON.stringify(data) });
          showNotification('Event updated', 'success');
        } else {
          await apiRequest('/events', { method: 'POST', body: JSON.stringify(data) });
          showNotification('Event created', 'success');
        }
        closeModal();
        loadEvents();
      } catch (err) { alert('Failed to save event'); }
    });

    loadEvents();
  </script>
</body>
</html>
