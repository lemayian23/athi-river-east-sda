<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --sda-blue: #1a2a4f;
      --sda-light-blue: #2c3e6d;
      --sda-gold: #c9a03d;
      --sda-purple: #8e6baf;
    }
    .bg-sda-blue { background-color: var(--sda-blue); }
    .text-sda-gold { color: var(--sda-gold); }
    .sidebar-link {
      display: block;
      padding: 0.75rem 1.5rem;
      color: #cbd5e1;
      transition: background 0.2s;
    }
    .sidebar-link:hover {
      background-color: #2c3e6d;
      color: white;
    }
    .sidebar-link.active {
      background-color: #2c3e6d;
      color: white;
      border-right: 4px solid var(--sda-gold);
    }
  </style>
</head>
<body class="bg-gray-100 h-screen flex">
  <!-- Sidebar -->
  <aside class="w-64 bg-sda-blue text-white flex flex-col flex-shrink-0">
    <div class="p-4 text-xl font-bold border-b border-gray-700">Athi River SDA</div>
    <nav class="flex-1 mt-4">
      <a href="/admin/dashboard.html" data-page="dashboard" class="sidebar-link active">📊 Dashboard</a>
      <a href="/admin/sermons.html" data-page="sermons" class="sidebar-link">📖 Sermons</a>
      <a href="#" data-page="events" class="sidebar-link">📅 Events</a>
      <a href="#" data-page="ministries" class="sidebar-link">👥 Ministries</a>
      <a href="#" data-page="prayers" class="sidebar-link">🙏 Prayers</a>
      <a href="#" data-page="settings" class="sidebar-link">⚙️ Settings</a>
    </nav>
    <div class="p-4 border-t border-gray-700">
      <button onclick="logout()" class="text-left text-sm text-gray-400 hover:text-white">🚪 Logout</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 overflow-y-auto p-6">
    <h1 class="text-2xl font-bold text-sda-light-blue">Dashboard</h1>
    <p class="text-gray-600">Welcome, Admin!</p>
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-6" id="statsGrid">
      <div class="bg-white p-4 rounded shadow text-center">
        <div class="text-3xl font-bold text-sda-blue" id="sermonCount">-</div>
        <div class="text-gray-500">Sermons</div>
      </div>
      <div class="bg-white p-4 rounded shadow text-center">
        <div class="text-3xl font-bold text-sda-blue" id="eventCount">-</div>
        <div class="text-gray-500">Events</div>
      </div>
      <div class="bg-white p-4 rounded shadow text-center">
        <div class="text-3xl font-bold text-sda-blue" id="ministryCount">-</div>
        <div class="text-gray-500">Ministries</div>
      </div>
      <div class="bg-white p-4 rounded shadow text-center">
        <div class="text-3xl font-bold text-sda-purple" id="prayerCount">-</div>
        <div class="text-gray-500">Unanswered Prayers</div>
      </div>
    </div>
  </main>

  <script src="/admin/admin.js"></script>
  <script>
    // Check token
    if (!getToken()) {
      window.location.href = '/admin/login.html';
    }

    // Load stats
    async function loadStats() {
      try {
        const sermons = await apiRequest('/sermons');
        document.getElementById('sermonCount').textContent = sermons.length;

        const events = await apiRequest('/events');
        document.getElementById('eventCount').textContent = events.length;

        const ministries = await apiRequest('/ministries');
        document.getElementById('ministryCount').textContent = ministries.length;

        const prayers = await apiRequest('/prayers');
        const unanswered = prayers.filter(p => p.is_answered === 0).length;
        document.getElementById('prayerCount').textContent = unanswered;
      } catch (err) {
        console.error(err);
        document.getElementById('statsGrid').innerHTML = '<p class="text-red-500">Error loading stats</p>';
      }
    }

    loadStats();
    highlightNav('dashboard');
  </script>
</body>
</html>
