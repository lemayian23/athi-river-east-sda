<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .bg-gradient-sda { background: linear-gradient(135deg, #1a2a4f 0%, #2c3e6d 100%); }
    .stat-card {
      background: white;
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.07);
      transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-4px); }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.5rem;
      color: #94a3b8;
      transition: all 0.2s;
      border-radius: 0.5rem;
      margin: 0.25rem 0.75rem;
    }
    .sidebar-link:hover {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    .sidebar-link.active {
      background: rgba(255,255,255,0.15);
      color: #c9a03d;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">
  <!-- Sidebar -->
    <nav class="flex-1 mt-4">
        <a href="/admin/dashboard.html" class="sidebar-link">📊 Dashboard</a>
        <a href="/admin/sermons.html" class="sidebar-link">📖 Sermons</a>
        <a href="/admin/events.html" class="sidebar-link">📅 Events</a>
        <a href="/admin/ministries.html" class="sidebar-link">👥 Ministries</a>
        <a href="/admin/prayers.html" class="sidebar-link">🙏 Prayers</a>
        <a href="/admin/settings.html" class="sidebar-link">⚙️ Settings</a>
    </nav>
    <div class="p-6 border-t border-white/10">
      <button onclick="logout()" class="sidebar-link text-red-300 hover:text-red-200">🚪 Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 p-8 overflow-y-auto">
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-800">Dashboard</h1>
      <p class="text-gray-500">Welcome back, Admin 👋</p>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6" id="statsGrid">
      <div class="stat-card border-l-4 border-sda-blue"><div class="text-3xl font-bold text-sda-blue" id="sermonCount">-</div><div class="text-gray-500">Sermons</div></div>
      <div class="stat-card border-l-4 border-green-500"><div class="text-3xl font-bold text-green-500" id="eventCount">-</div><div class="text-gray-500">Events</div></div>
      <div class="stat-card border-l-4 border-purple-500"><div class="text-3xl font-bold text-purple-500" id="ministryCount">-</div><div class="text-gray-500">Ministries</div></div>
      <div class="stat-card border-l-4 border-yellow-500"><div class="text-3xl font-bold text-yellow-500" id="prayerCount">-</div><div class="text-gray-500">Unanswered Prayers</div></div>
    </div>
  </main>

  <script src="/admin/admin.js"></script>
  <script>
    if (!getToken()) window.location.href = '/admin/login.html';

    async function loadStats() {
      try {
        const sermons = await apiRequest('/sermons');
        document.getElementById('sermonCount').textContent = sermons.length;
        const events = await apiRequest('/events');
        document.getElementById('eventCount').textContent = events.length;
        const ministries = await apiRequest('/ministries');
        document.getElementById('ministryCount').textContent = ministries.length;
        const prayers = await apiRequest('/prayers');
        document.getElementById('prayerCount').textContent = prayers.filter(p => !p.is_answered).length;
      } catch (err) { console.error(err); }
    }
    loadStats();
  </script>
</body>
</html>
