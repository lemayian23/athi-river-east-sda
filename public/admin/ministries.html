<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Ministries</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* (same styles as above) */
    * { font-family: 'Inter', sans-serif; }
    .bg-gradient-sda { background: linear-gradient(135deg, #1a2a4f 0%, #2c3e6d 100%); }
    .sidebar-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem; color: #94a3b8; transition: all 0.2s; border-radius: 0.5rem; margin: 0.25rem 0.75rem; text-decoration: none; }
    .sidebar-link:hover { background: rgba(255,255,255,0.1); color: white; }
    .sidebar-link.active { background: rgba(255,255,255,0.15); color: #c9a03d; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; }
    .modal.open { display: flex; }
    .modal-content { background: white; padding: 2rem; border-radius: 1rem; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .btn-primary { background: linear-gradient(135deg, #1a2a4f, #2c3e6d); color: white; padding: 0.5rem 1.5rem; border-radius: 0.5rem; border: none; cursor: pointer; }
    .btn-primary:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(26,42,79,0.3); }
    .btn-danger { background: #ef4444; color: white; padding: 0.25rem 1rem; border-radius: 0.5rem; border: none; cursor: pointer; }
    .btn-danger:hover { background: #dc2626; }
    .btn-edit { background: #3b82f6; color: white; padding: 0.25rem 1rem; border-radius: 0.5rem; border: none; cursor: pointer; }
    .btn-edit:hover { background: #2563eb; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">
  <!-- Sidebar -->
  <aside class="w-64 bg-gradient-sda text-white flex flex-col flex-shrink-0 min-h-screen">
    <div class="p-6 text-xl font-bold border-b border-white/10">⛪ Athi River SDA</div>
    <nav class="flex-1 mt-4">
      <a href="/admin/dashboard.html" class="sidebar-link">📊 Dashboard</a>
      <a href="/admin/sermons.html" class="sidebar-link">📖 Sermons</a>
      <a href="/admin/events.html" class="sidebar-link">📅 Events</a>
      <a href="/admin/ministries.html" class="sidebar-link active">👥 Ministries</a>
      <a href="/admin/prayers.html" class="sidebar-link">🙏 Prayers</a>
      <a href="/admin/settings.html" class="sidebar-link">⚙️ Settings</a>
    </nav>
    <div class="p-6 border-t border-white/10">
      <button onclick="logout()" class="sidebar-link text-red-300 hover:text-red-200 w-full text-left">🚪 Logout</button>
    </div>
  </aside>

  <main class="flex-1 p-8 overflow-y-auto">
    <div class="flex justify-between items-center mb-6">
      <div><h1 class="text-3xl font-bold text-gray-800">👥 Ministries</h1><p class="text-gray-500">Manage church departments</p></div>
      <button onclick="openAddModal()" class="btn-primary">+ Add Ministry</button>
    </div>

    <div class="bg-white rounded-xl shadow overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-50"><tr><th class="p-4 text-left">Name</th><th class="p-4 text-left">Leader</th><th class="p-4 text-left">Meeting Day</th><th class="p-4 text-left">Actions</th></tr></thead>
        <tbody id="ministriesTableBody"><tr><td colspan="4" class="p-4 text-center text-gray-500">Loading...</td></tr></tbody>
      </table>
    </div>

    <!-- Modal -->
    <div id="ministryModal" class="modal">
      <div class="modal-content">
        <h2 id="modalTitle" class="text-2xl font-bold text-gray-800 mb-4">Add Ministry</h2>
        <form id="ministryForm">
          <input type="hidden" id="ministryId">
          <div class="mb-3"><label class="block text-sm font-medium text-gray-700">Name *</label><input type="text" id="name" required class="w-full p-2 border rounded-lg"></div>
          <div class="mb-3"><label class="block text-sm font-medium text-gray-700">Leader</label><input type="text" id="leader" class="w-full p-2 border rounded-lg"></div>
          <div class="mb-3"><label class="block text-sm font-medium text-gray-700">Email</label><input type="email" id="email" class="w-full p-2 border rounded-lg"></div>
          <div class="mb-3"><label class="block text-sm font-medium text-gray-700">Phone</label><input type="text" id="phone" class="w-full p-2 border rounded-lg"></div>
          <div class="mb-3"><label class="block text-sm font-medium text-gray-700">Meeting Day</label><input type="text" id="meetingDay" placeholder="e.g., Saturday" class="w-full p-2 border rounded-lg"></div>
          <div class="mb-3"><label class="block text-sm font-medium text-gray-700">Meeting Time</label><input type="text" id="meetingTime" placeholder="e.g., 4:00 PM" class="w-full p-2 border rounded-lg"></div>
          <div class="mb-4"><label class="block text-sm font-medium text-gray-700">Description</label><textarea id="description" rows="2" class="w-full p-2 border rounded-lg"></textarea></div>
          <div class="flex justify-end gap-2">
            <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-lg hover:bg-gray-50">Cancel</button>
            <button type="submit" class="btn-primary">Save Ministry</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="/admin/admin.js"></script>
  <script>
    if (!getToken()) window.location.href = '/admin/login.html';

    window.openAddModal = function() {
      document.getElementById('modalTitle').textContent = 'Add Ministry';
      document.getElementById('ministryForm').reset();
      document.getElementById('ministryId').value = '';
      document.getElementById('ministryModal').classList.add('open');
    };
    window.closeModal = function() {
      document.getElementById('ministryModal').classList.remove('open');
    };
    document.getElementById('ministryModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    let allMinistries = [];
    async function loadMinistries() {
      try {
        allMinistries = await apiRequest('/ministries');
        renderTable(allMinistries);
      } catch (err) {
        document.getElementById('ministriesTableBody').innerHTML = '<tr><td colspan="4" class="p-4 text-center text-red-500">Error loading</td></tr>';
      }
    }
    function renderTable(data) {
      const tbody = document.getElementById('ministriesTableBody');
      if (!data.length) return tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-gray-500">No ministries</td></tr>';
      tbody.innerHTML = data.map(m => `
        <tr class="border-t hover:bg-gray-50">
          <td class="p-4 font-medium">${m.name}</td>
          <td class="p-4">${m.leader || '-'}</td>
          <td class="p-4">${m.meeting_day ? m.meeting_day + ' ' + (m.meeting_time || '') : '-'}</td>
          <td class="p-4 space-x-1">
            <button onclick="editMinistry(${m.id})" class="btn-edit">Edit</button>
            <button onclick="deleteMinistry(${m.id})" class="btn-danger">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    window.editMinistry = async function(id) {
      try {
        const m = await apiRequest(`/ministries/${id}`);
        document.getElementById('modalTitle').textContent = 'Edit Ministry';
        document.getElementById('ministryId').value = m.id;
        document.getElementById('name').value = m.name;
        document.getElementById('leader').value = m.leader || '';
        document.getElementById('email').value = m.email || '';
        document.getElementById('phone').value = m.phone || '';
        document.getElementById('meetingDay').value = m.meeting_day || '';
        document.getElementById('meetingTime').value = m.meeting_time || '';
        document.getElementById('description').value = m.description || '';
        document.getElementById('ministryModal').classList.add('open');
      } catch (err) { alert('Error loading ministry'); }
    };
    window.deleteMinistry = async function(id) {
      if (!confirm('Delete this ministry?')) return;
      try {
        await apiRequest(`/ministries/${id}`, { method: 'DELETE' });
        showNotification('Ministry deleted', 'success');
        loadMinistries();
      } catch (err) { alert('Failed to delete'); }
    };
    document.getElementById('ministryForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const id = document.getElementById('ministryId').value;
      const data = {
        name: document.getElementById('name').value,
        leader: document.getElementById('leader').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        meeting_day: document.getElementById('meetingDay').value,
        meeting_time: document.getElementById('meetingTime').value,
        description: document.getElementById('description').value
      };
      try {
        if (id) {
          await apiRequest(`/ministries/${id}`, { method: 'PUT', body: JSON.stringify(data) });
          showNotification('Ministry updated', 'success');
        } else {
          await apiRequest('/ministries', { method: 'POST', body: JSON.stringify(data) });
          showNotification('Ministry created', 'success');
        }
        closeModal();
        loadMinistries();
      } catch (err) { alert('Failed to save ministry'); }
    });

    loadMinistries();
  </script>
</body>
</html>
