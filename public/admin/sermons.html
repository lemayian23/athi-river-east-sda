<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Sermons</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .bg-gradient-sda { background: linear-gradient(135deg, #1a2a4f 0%, #2c3e6d 100%); }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1.5rem;
      color: #94a3b8;
      transition: all 0.2s;
      border-radius: 0.5rem;
      margin: 0.25rem 0.75rem;
    }
    .sidebar-link:hover { background: rgba(255,255,255,0.1); color: white; }
    .sidebar-link.active { background: rgba(255,255,255,0.15); color: #c9a03d; }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: white;
      padding: 2rem;
      border-radius: 1rem;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .btn-primary {
      background: linear-gradient(135deg, #1a2a4f, #2c3e6d);
      color: white;
      padding: 0.5rem 1.5rem;
      border-radius: 0.5rem;
      transition: all 0.2s;
    }
    .btn-primary:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(26,42,79,0.3); }
    .btn-danger { background: #ef4444; color: white; padding: 0.25rem 1rem; border-radius: 0.5rem; transition: all 0.2s; }
    .btn-danger:hover { background: #dc2626; }
    .btn-edit { background: #3b82f6; color: white; padding: 0.25rem 1rem; border-radius: 0.5rem; transition: all 0.2s; }
    .btn-edit:hover { background: #2563eb; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">
  <!-- Sidebar -->
  <aside class="w-64 bg-gradient-sda text-white flex flex-col flex-shrink-0 min-h-screen">
    <div class="p-6 text-xl font-bold border-b border-white/10">⛪ Athi River SDA</div>
    <nav class="flex-1 mt-4">
        <a href="/admin/dashboard.html" class="sidebar-link">📊 Dashboard</a>
        <a href="/admin/sermons.html" class="sidebar-link">📖 Sermons</a>
        <a href="/admin/events.html" class="sidebar-link">📅 Events</a>
        <a href="/admin/ministries.html" class="sidebar-link">👥 Ministries</a>
        <a href="/admin/prayers.html" class="sidebar-link">🙏 Prayers</a>
        <a href="/admin/settings.html" class="sidebar-link">⚙️ Settings</a>
    </nav>
    <div class="p-6 border-t border-white/10">
      <button onclick="logout()" class="sidebar-link text-red-300 hover:text-red-200">🚪 Logout</button>
    </div>
  </aside>S

  <!-- Main -->
  <main class="flex-1 p-8 overflow-y-auto">
    <div class="flex justify-between items-center mb-6">
      <div><h1 class="text-3xl font-bold text-gray-800">📖 Sermons</h1><p class="text-gray-500">Manage your church sermons</p></div>
      <button onclick="openAddModal()" class="btn-primary">+ Add Sermon</button>
    </div>

    <input type="text" id="searchInput" placeholder="Search by title or speaker..." class="w-full p-3 border rounded-lg mb-4 focus:ring-2 focus:ring-sda-gold focus:border-transparent">

    <div class="bg-white rounded-xl shadow overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-50">
          <tr><th class="p-4 text-left">Title</th><th class="p-4 text-left">Speaker</th><th class="p-4 text-left">Date</th><th class="p-4 text-left">Views</th><th class="p-4 text-left">Actions</th></tr>
        </thead>
        <tbody id="sermonsTableBody"><tr><td colspan="5" class="p-4 text-center text-gray-500">Loading...</td></tr></tbody>
      </table>
    </div>

    <!-- Modal -->
    <div id="sermonModal" class="modal">
      <div class="modal-content">
        <h2 id="modalTitle" class="text-2xl font-bold text-gray-800 mb-4">Add Sermon</h2>
        <form id="sermonForm">
          <input type="hidden" id="sermonId">
          <div class="mb-3"><label class="block text-sm font-medium text-gray-700">Title *</label><input type="text" id="title" required class="w-full p-2 border rounded-lg"></div>
          <div class="mb-3"><label class="block text-sm font-medium text-gray-700">Speaker *</label><input type="text" id="speaker" required class="w-full p-2 border rounded-lg"></div>
          <div class="mb-3"><label class="block text-sm font-medium text-gray-700">Scripture</label><input type="text" id="scripture" class="w-full p-2 border rounded-lg"></div>
          <div class="mb-3"><label class="block text-sm font-medium text-gray-700">Description</label><textarea id="description" rows="3" class="w-full p-2 border rounded-lg"></textarea></div>
          <div class="mb-3"><label class="block text-sm font-medium text-gray-700">Audio URL</label><input type="url" id="audioUrl" class="w-full p-2 border rounded-lg" placeholder="https://example.com/sermon.mp3"></div>
          <div class="mb-3"><label class="block text-sm font-medium text-gray-700">Video URL</label><input type="url" id="videoUrl" class="w-full p-2 border rounded-lg" placeholder="https://youtube.com/watch?v=..."></div>
          <div class="mb-4"><label class="block text-sm font-medium text-gray-700">Date *</label><input type="date" id="date" required class="w-full p-2 border rounded-lg"></div>
          <div class="flex justify-end gap-2">
            <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-lg hover:bg-gray-50">Cancel</button>
            <button type="submit" class="btn-primary">Save Sermon</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="/admin/admin.js"></script>
  <script>
    if (!getToken()) window.location.href = '/admin/login.html';

    // Modal functions
    function openAddModal() {
      document.getElementById('modalTitle').textContent = 'Add Sermon';
      document.getElementById('sermonForm').reset();
      document.getElementById('sermonId').value = '';
      document.getElementById('sermonModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('sermonModal').classList.remove('open');
    }

    // Close modal on background click
    document.getElementById('sermonModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // Load sermons
    let allSermons = [];
    async function loadSermons() {
      try {
        allSermons = await apiRequest('/sermons');
        renderTable(allSermons);
      } catch (err) {
        document.getElementById('sermonsTableBody').innerHTML = '<tr><td colspan="5" class="p-4 text-center text-red-500">Error loading</td></tr>';
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById('sermonsTableBody');
      if (!data.length) return tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-500">No sermons</td></tr>';
      tbody.innerHTML = data.map(s => `
        <tr class="border-t hover:bg-gray-50 transition">
          <td class="p-4 font-medium">${s.title}</td>
          <td class="p-4">${s.speaker}</td>
          <td class="p-4">${new Date(s.date).toLocaleDateString()}</td>
          <td class="p-4">${s.views || 0}</td>
          <td class="p-4 space-x-1">
            <button onclick="editSermon(${s.id})" class="btn-edit">Edit</button>
            <button onclick="deleteSermon(${s.id})" class="btn-danger">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    // Search
    document.getElementById('searchInput').addEventListener('input', function() {
      const q = this.value.toLowerCase();
      renderTable(allSermons.filter(s => s.title.toLowerCase().includes(q) || s.speaker.toLowerCase().includes(q)));
    });

    // Edit
    async function editSermon(id) {
      try {
        const s = await apiRequest(`/sermons/${id}`);
        document.getElementById('modalTitle').textContent = 'Edit Sermon';
        document.getElementById('sermonId').value = s.id;
        document.getElementById('title').value = s.title;
        document.getElementById('speaker').value = s.speaker;
        document.getElementById('scripture').value = s.scripture || '';
        document.getElementById('description').value = s.description || '';
        document.getElementById('audioUrl').value = s.audio_url || '';
        document.getElementById('videoUrl').value = s.video_url || '';
        document.getElementById('date').value = s.date;
        document.getElementById('sermonModal').classList.add('open');
      } catch (err) { alert('Error loading sermon'); }
    }

    // Delete
    async function deleteSermon(id) {
      if (!confirm('Delete this sermon?')) return;
      try {
        await apiRequest(`/sermons/${id}`, { method: 'DELETE' });
        showNotification('Sermon deleted successfully', 'success');
        loadSermons();
      } catch (err) { alert('Failed to delete'); }
    }

    // Form submit
    document.getElementById('sermonForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const id = document.getElementById('sermonId').value;
      const data = {
        title: document.getElementById('title').value,
        speaker: document.getElementById('speaker').value,
        scripture: document.getElementById('scripture').value,
        description: document.getElementById('description').value,
        audio_url: document.getElementById('audioUrl').value,
        video_url: document.getElementById('videoUrl').value,
        date: document.getElementById('date').value
      };
      try {
        if (id) {
          await apiRequest(`/sermons/${id}`, { method: 'PUT', body: JSON.stringify(data) });
          showNotification('Sermon updated successfully', 'success');
        } else {
          await apiRequest('/sermons', { method: 'POST', body: JSON.stringify(data) });
          showNotification('Sermon created successfully', 'success');
        }
        closeModal();
        loadSermons();
      } catch (err) { alert('Failed to save sermon'); }
    });

    loadSermons();
  </script>
</body>
</html>
